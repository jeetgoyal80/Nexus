name: Full Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy all services
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy all services on EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 45m
          script: |
            set -Eeuo pipefail

            DEPLOY_DIR="$HOME/apps/Nexus"
            TARGET_SHA="${{ github.sha }}"

            log() { printf '[%s] %s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$*"; }
            show_logs() {
              log "Full deployment failed. Recent service logs:"
              docker compose logs --tail=160 backend ingestion-worker rag-service || true
            }
            trap show_logs ERR

            log "Updating repository"
            cd "$DEPLOY_DIR"
            git fetch --prune origin main
            git checkout main
            git reset --hard "$TARGET_SHA"

            log "Building and starting all Docker Compose services"
            docker compose up -d --build

            log "Verifying RAG health"
            timeout 180 sh -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" chatbot-rag-service 2>/dev/null)" = "healthy" ]; do sleep 5; done'

            log "Verifying backend health"
            timeout 120 sh -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" chatbot-backend 2>/dev/null)" = "healthy" ]; do sleep 5; done'

            log "Cleaning unused Docker images"
            docker image prune -f

            trap - ERR
            log "Full deployment completed successfully"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Full Deployment"
            echo "- Status: ${{ job.status }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Services: all Docker Compose services"
            echo "- Target: EC2 Docker Compose"
          } >> "$GITHUB_STEP_SUMMARY"