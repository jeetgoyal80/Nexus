name: chatbot-ai-platform

services:
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    image: chatbot-rag-service:latest
    container_name: chatbot-rag-service
    restart: unless-stopped
    env_file:
      - ./rag-service/.env
    environment:
      USE_TF: "0"
      USE_FLAX: "0"
      TRANSFORMERS_NO_TF: "1"
      TRANSFORMERS_NO_FLAX: "1"
    ports:
      - "8001:8001"
    networks:
      - chatbot-platform
    volumes:
      - rag_tmp:/tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chatbot-backend:latest
    container_name: chatbot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      RAG_SERVICE_URL: http://rag-service:8001
      UPLOAD_DIR: /app/uploads
    ports:
      - "5000:5000"
    networks:
      - chatbot-platform
    volumes:
      - uploaded_documents:/app/uploads
    depends_on:
      rag-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ingestion-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    image: chatbot-ingestion-worker:latest
    container_name: chatbot-ingestion-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      RAG_SERVICE_URL: http://rag-service:8001
      UPLOAD_DIR: /app/uploads
    networks:
      - chatbot-platform
    volumes:
      - uploaded_documents:/app/uploads
    depends_on:
      rag-service:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "import('./src/infrastructure/redis/redisClient.js').then(async ({ redisConnection, checkRedisHealth }) => { const healthy = await checkRedisHealth(); await redisConnection.quit(); process.exit(healthy ? 0 : 1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  chatbot-platform:
    driver: bridge

volumes:
  uploaded_documents:
  rag_tmp:
